<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <title>Especialidades MASS</title>
</h:head>
<h:body>
    <h1>Catálogo de especialidades</h1>
    <h:link value="Volver al inicio" outcome="index" />

    <h:dataTable value="#{administradorBean.especialidades}" var="esp" border="1">
        <h:column>
            <f:facet name="header">Especialidad</f:facet>
            #{esp.nombre}
        </h:column>
        <h:column>
            <f:facet name="header">Descripción</f:facet>
            #{esp.descripcion}
        </h:column>
        <h:column>
            <f:facet name="header">Médicos</f:facet>
            <ui:repeat xmlns:ui="http://xmlns.jcp.org/jsf/facelets" value="#{esp.medicos}" var="med">
                #{med.nombreCompleto}
            </ui:repeat>
        </h:column>
    </h:dataTable>
</h:body>
</html>
