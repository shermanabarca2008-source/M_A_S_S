<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
    <title>Panel paciente</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; }
        .card { border: 1px solid #ccc; padding: 16px; margin-bottom: 20px; border-radius: 8px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .tab-btn { padding: 10px 14px; border: 1px solid #d0d5dd; border-radius: 999px; background: #f8fafc; cursor: pointer; }
        .tab-btn.active { background: #2563eb; color: white; border-color: #2563eb; }
        .msg { color: #b42318; font-weight: bold; }
        .ok { color: #027a48; font-weight: bold; }
    </style>
</h:head>
<h:body>
    <h1>Panel del paciente</h1>
    <p>Bienvenido, #{pacienteBean.pacienteActual.nombreCompleto}</p>
    <p>Tu cédula es #{pacienteBean.pacienteActual.cedula}</p>

    <h:form>
        <div class="tabs">
            <h:commandButton value="Agendar cita" action="#{pacienteBean.seleccionarTab('agendar')}" styleClass="tab-btn #{pacienteBean.tabActiva('agendar') ? 'active' : ''}" />
            <h:commandButton value="Mis citas" action="#{pacienteBean.seleccionarTab('citas')}" styleClass="tab-btn #{pacienteBean.tabActiva('citas') ? 'active' : ''}" />
            <h:commandButton value="Historial clínico" action="#{pacienteBean.seleccionarTab('historial')}" styleClass="tab-btn #{pacienteBean.tabActiva('historial') ? 'active' : ''}" />
        </div>

        <h:panelGroup rendered="#{pacienteBean.tabActiva('agendar')}">
            <div class="card">
                <h2>Agendar cita</h2>
                <h:panelGrid columns="2">
                    <h:outputLabel value="Especialidad" for="esp" />
                    <h:selectOneMenu id="esp" value="#{pacienteBean.especialidadSeleccionada}">
                        <f:selectItem itemValue="" itemLabel="Seleccione" />
                        <f:selectItems value="#{pacienteBean.especialidades}" var="esp" itemValue="#{esp.nombre}" itemLabel="#{esp.nombre}" />
                    </h:selectOneMenu>

                    <h:outputLabel value="Médico" for="med" />
                    <h:selectOneMenu id="med" value="#{pacienteBean.medicoSeleccionado}">
                        <f:selectItem itemValue="" itemLabel="Seleccione" />
                        <f:selectItems value="#{pacienteBean.medicosDisponibles}" var="med" itemValue="#{med.nombreCompleto}" itemLabel="#{med.nombreCompleto}" />
                    </h:selectOneMenu>

                    <h:outputLabel value="Horario" for="hor" />
                    <h:selectOneMenu id="hor" value="#{pacienteBean.horarioSeleccionado}">
                        <f:selectItem itemValue="" itemLabel="Seleccione" />
                        <f:selectItems value="#{pacienteBean.horariosDisponibles}" var="hor" itemValue="#{hor.fechaDisponible} #{hor.horaInicio}" itemLabel="#{hor.fechaDisponible} #{hor.horaInicio}" />
                    </h:selectOneMenu>
                </h:panelGrid>
                <br/>
                <h:commandButton value="Agendar cita" action="#{pacienteBean.agendarCita}" />
                <br/><br/>
                <h:outputText value="#{pacienteBean.mensaje}" styleClass="msg" rendered="#{not empty pacienteBean.mensaje and pacienteBean.error}" />
                <h:outputText value="#{pacienteBean.mensaje}" styleClass="ok" rendered="#{not empty pacienteBean.mensaje and not pacienteBean.error}" />
            </div>
        </h:panelGroup>

        <h:panelGroup rendered="#{pacienteBean.tabActiva('citas')}">
            <div class="card">
                <h2>Mis citas asignadas</h2>
                <h:selectOneMenu value="#{pacienteBean.citaSeleccionada}">
                    <f:selectItem itemValue="" itemLabel="Seleccione una cita" />
                    <f:selectItems value="#{pacienteBean.citasPaciente}" />
                </h:selectOneMenu>
                <br/><br/>
                <h:commandButton value="Cancelar cita" action="#{pacienteBean.cancelarCita}" />
                <br/><br/>
                <h:outputText value="#{pacienteBean.mensaje}" styleClass="msg" rendered="#{not empty pacienteBean.mensaje and pacienteBean.error}" />
                <h:outputText value="#{pacienteBean.mensaje}" styleClass="ok" rendered="#{not empty pacienteBean.mensaje and not pacienteBean.error}" />
            </div>
        </h:panelGroup>

        <h:panelGroup rendered="#{pacienteBean.tabActiva('historial')}">
            <div class="card">
                <h2>Historial clínico</h2>
                <h:commandButton value="Consultar historial" action="#{pacienteBean.seleccionarTab('historial')}" />
                <br/><br/>
                <ul>
                    <ui:repeat value="#{pacienteBean.historialClinico}" var="item">
                        <li>#{item}</li>
                    </ui:repeat>
                </ul>
            </div>
        </h:panelGroup>
    </h:form>

    <h:link value="Volver al inicio" outcome="index" />
</h:body>
</html>
