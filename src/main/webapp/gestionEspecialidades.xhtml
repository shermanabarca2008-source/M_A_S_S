<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
    <title>Gestión de Especialidades</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; background-color: #f4faff; }
        .card { border: 1px solid #ccc; padding: 16px; margin-bottom: 20px; border-radius: 8px; background: white; }
        .btn { padding: 10px 16px; border: 1px solid #d0d5dd; border-radius: 8px; background: #f8fafc; cursor: pointer; }
        .btn-primary { background: #004d99; color: white; border-color: #004d99; }
        .btn-danger { background: #ba1a1a; color: white; border-color: #ba1a1a; }
        .msg { color: #ba1a1a; font-weight: bold; }
        .ok { color: #005b15; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e0e4e8; }
        th { background: #e9f6fd; }
        tr:hover { background: #f8fafc; }
    </style>
</h:head>
<h:body>
    <h1>Gestión de Especialidades</h1>
    <p>Total de especialidades: #{administradorBean.especialidades.size()}</p>

    <h:form>
        <h:commandButton value="Nueva Especialidad" action="#{administradorBean.mostrarFormulario}" styleClass="btn btn-primary"/>

        <h:panelGroup rendered="#{administradorBean.formularioVisible}">
            <div class="card">
                <h2>Agregar Nueva Especialidad</h2>
                <h:panelGrid columns="2">
                    <h:outputLabel value="Nombre:" for="nombre"/>
                    <h:inputText id="nombre" value="#{administradorBean.nombreEspecialidad}"/>

                    <h:outputLabel value="Descripción:" for="descripcion"/>
                    <h:inputText id="descripcion" value="#{administradorBean.descripcionEspecialidad}"/>

                    <h:outputText value=""/>
                    <div>
                        <h:commandButton value="Guardar" action="#{administradorBean.agregarEspecialidad}" styleClass="btn btn-primary"/>
                        <h:commandButton value="Cancelar" action="#{administradorBean.ocultarFormulario}" styleClass="btn"/>
                    </div>
                </h:panelGrid>
                <br/>
                <h:outputText value="#{administradorBean.mensajeAdmin}" styleClass="msg" rendered="#{not empty administradorBean.mensajeAdmin and administradorBean.errorAdmin}"/>
                <h:outputText value="#{administradorBean.mensajeAdmin}" styleClass="ok" rendered="#{not empty administradorBean.mensajeAdmin and not administradorBean.errorAdmin}"/>
            </div>
        </h:panelGroup>
    </h:form>

    <div class="card">
        <h2>Especialidades Registradas</h2>
        <h:form>
            <table>
                <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Nº Médicos</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <ui:repeat value="#{administradorBean.especialidades}" var="esp">
                    <tr>
                        <td>#{esp.nombre}</td>
                        <td>#{esp.medicos.size()}</td>
                        <td>
                            <h:commandLink value="Eliminar" action="#{administradorBean.eliminarEspecialidad(esp)}" styleClass="btn-danger"/>
                        </td>
                    </tr>
                </ui:repeat>
                </tbody>
            </table>
        </h:form>
    </div>

    <h:link value="Volver al panel de administración" outcome="gestionAdmin" styleClass="btn"/>
</h:body>
</html>
